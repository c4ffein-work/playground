<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120">
  <!-- Background -->
  <rect width="720" height="120" fill="#0d1117" rx="12"/>

  <!--
    Animation: 12.5s cycle, 5 states with alternating left/right transitions
    Each state: 2s hold + 0.5s transition = 2.5s per step

    State 0 (0-2s):      Angular <=> Django   then LEFT transition
    State 1 (2.5-4.5s):  React   <=> Django   then RIGHT transition
    State 2 (5-7s):      React   <=> Hono     then LEFT transition
    State 3 (7.5-9.5s):  Vue     <=> Hono     then RIGHT transition
    State 4 (10-12s):    Vue     <=> Django    then LEFT transition (loop)
  -->

  <!-- ==================== LEFT SLOT ==================== -->

  <!-- ANGULAR (visible: states 0, wraps from end of 4->0 transition) -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.16;0.2;0.96;1"
      values="1;1;0;0;1"/>
    <animateTransform attributeName="transform" type="translate" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.16;0.2;0.204;0.96;1"
      values="0 0;0 0;0 -15;0 15;0 15;0 0"/>
    <!-- Angular shield -->
    <g transform="translate(160, 38)">
      <path d="M0,-26 L24,-16 L20,14 L0,26 L-20,14 L-24,-16 Z" fill="#DD0031"/>
      <path d="M0,-26 L0,26 L20,14 L24,-16 Z" fill="#C3002F"/>
      <path d="M0,-14 L-9,12 L-5,12 L-3,5 L3,5 L5,12 L9,12 Z" fill="white"/>
      <rect x="-4" y="0" width="8" height="3" rx="0.5" fill="#DD0031"/>
    </g>
    <text x="160" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#DD0031">Angular</text>
  </g>

  <!-- REACT (visible: states 1, 2) -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.16;0.2;0.56;0.6;1"
      values="0;0;1;1;0;0"/>
    <animateTransform attributeName="transform" type="translate" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.16;0.2;0.56;0.6;0.604;1"
      values="0 15;0 15;0 0;0 0;0 -15;0 15;0 15"/>
    <!-- React atom -->
    <g transform="translate(160, 38)">
      <circle cx="0" cy="0" r="4.5" fill="#61DAFB"/>
      <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#61DAFB" stroke-width="1.8"/>
      <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#61DAFB" stroke-width="1.8" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="24" ry="9" fill="none" stroke="#61DAFB" stroke-width="1.8" transform="rotate(-60)"/>
    </g>
    <text x="160" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#61DAFB">React</text>
  </g>

  <!-- VUE.JS (visible: states 3, 4) -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.56;0.6;0.96;1"
      values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.56;0.6;0.96;1"
      values="0 15;0 15;0 0;0 0;0 -15"/>
    <!-- Vue chevrons -->
    <g transform="translate(160, 38)">
      <path d="M-24,-24 L0,22 L24,-24 L14.5,-24 L0,2 L-14.5,-24 Z" fill="#34495E"/>
      <path d="M-14.5,-24 L0,2 L14.5,-24 L8.5,-24 L0,-10 L-8.5,-24 Z" fill="#41B883"/>
    </g>
    <text x="160" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#41B883">Vue.js</text>
  </g>

  <!-- ==================== CENTER ARROW ==================== -->
  <g transform="translate(360, 48)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-40,0 -30,-6 -30,6" fill="#8b949e"/>
    <polygon points="40,0 30,-6 30,6" fill="#8b949e"/>
  </g>

  <!-- ==================== RIGHT SLOT ==================== -->

  <!-- DJANGO (visible: states 0, 1, 4 — wraps around) -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.36;0.4;0.76;0.8;1"
      values="1;1;0;0;1;1"/>
    <animateTransform attributeName="transform" type="translate" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.36;0.4;0.404;0.76;0.8;1"
      values="0 0;0 0;0 -15;0 15;0 15;0 0;0 0"/>
    <!-- Django "D" letterform (unmodified style, official green) -->
    <g transform="translate(560, 38)">
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#092E20"/>
      <text x="0" y="8" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="white">D</text>
    </g>
    <text x="560" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#44B78B">django</text>
  </g>

  <!-- HONO (visible: states 2, 3) -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.36;0.4;0.76;0.8;1"
      values="0;0;1;1;0;0"/>
    <animateTransform attributeName="transform" type="translate" dur="12.5s" repeatCount="indefinite"
      keyTimes="0;0.36;0.4;0.76;0.8;0.804;1"
      values="0 15;0 15;0 0;0 0;0 -15;0 15;0 15"/>
    <!-- Hono flame -->
    <g transform="translate(560, 38)">
      <path d="M0,24 C-8,14 -18,-2 -14,-16 C-10,-8 -4,-2 0,-8 C4,-2 10,-8 14,-16 C18,-2 8,14 0,24 Z" fill="#FF5B11"/>
      <path d="M0,24 C-4,16 -8,6 -6,-4 C-3,0 -1,4 0,0 C1,4 3,0 6,-4 C8,6 4,16 0,24 Z" fill="#FFBD2E"/>
    </g>
    <text x="560" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#FF5B11">Hono</text>
  </g>

</svg>
