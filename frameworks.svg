<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 100">
  <!-- Background -->
  <rect width="720" height="100" fill="#0d1117" rx="12"/>

  <!--
    Animation: 12s cycle, 5 states with alternating left/right transitions
    Each state: 2s hold + 0.4s transition (0.2s fade-out then 0.2s fade-in, no overlap)
    Layout: logo on left, name on right within each slot
  -->

  <!-- ==================== LEFT SLOT ==================== -->

  <!-- ANGULAR -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.1667;0.1833;0.9833;1"
      values="1;1;0;0;1"/>
    <animateTransform attributeName="transform" type="translate" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.1667;0.1833;0.187;0.9833;1"
      values="0 0;0 0;0 -15;0 15;0 15;0 0"/>
    <g transform="translate(100, 50)">
      <path d="M0,-22 L20,-13 L17,12 L0,22 L-17,12 L-20,-13 Z" fill="#DD0031"/>
      <path d="M0,-22 L0,22 L17,12 L20,-13 Z" fill="#C3002F"/>
      <path d="M0,-11 L-7,10 L-4,10 L-2.5,4.5 L2.5,4.5 L4,10 L7,10 Z" fill="white"/>
      <rect x="-3" y="0.5" width="6" height="2.5" rx="0.5" fill="#DD0031"/>
    </g>
    <text x="135" y="54" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#DD0031">Angular</text>
  </g>

  <!-- REACT -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.1833;0.2;0.5667;0.5833;1"
      values="0;0;1;1;0;0"/>
    <animateTransform attributeName="transform" type="translate" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.1833;0.2;0.5667;0.5833;0.587;1"
      values="0 15;0 15;0 0;0 0;0 -15;0 15;0 15"/>
    <g transform="translate(100, 50)">
      <circle cx="0" cy="0" r="3.8" fill="#61DAFB"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61DAFB" stroke-width="1.6"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61DAFB" stroke-width="1.6" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61DAFB" stroke-width="1.6" transform="rotate(-60)"/>
    </g>
    <text x="135" y="54" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#61DAFB">React</text>
  </g>

  <!-- VUE.JS -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.5833;0.6;0.9667;0.9833;1"
      values="0;0;1;1;0;0"/>
    <animateTransform attributeName="transform" type="translate" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.5833;0.6;0.9667;0.9833;0.987;1"
      values="0 15;0 15;0 0;0 0;0 -15;0 15;0 15"/>
    <g transform="translate(100, 50)">
      <path d="M-20,-20 L0,18 L20,-20 L12,-20 L0,2 L-12,-20 Z" fill="#34495E"/>
      <path d="M-12,-20 L0,2 L12,-20 L7,-20 L0,-8 L-7,-20 Z" fill="#41B883"/>
    </g>
    <text x="135" y="54" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#41B883">Vue.js</text>
  </g>

  <!-- ==================== CENTER ARROW ==================== -->
  <g transform="translate(360, 50)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-40,0 -30,-6 -30,6" fill="#8b949e"/>
    <polygon points="40,0 30,-6 30,6" fill="#8b949e"/>
  </g>

  <!-- ==================== RIGHT SLOT ==================== -->

  <!-- DJANGO -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.3667;0.3833;0.7833;0.8;1"
      values="1;1;0;0;1;1"/>
    <animateTransform attributeName="transform" type="translate" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.3667;0.3833;0.387;0.7833;0.8;1"
      values="0 0;0 0;0 -15;0 15;0 15;0 0;0 0"/>
    <g transform="translate(500, 50)">
      <rect x="-18" y="-20" width="36" height="40" rx="3" fill="#092E20"/>
      <text x="0" y="7" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="white">D</text>
    </g>
    <text x="535" y="54" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#44B78B">django</text>
  </g>

  <!-- HONO -->
  <g opacity="0">
    <animate attributeName="opacity" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.3833;0.4;0.7667;0.7833;1"
      values="0;0;1;1;0;0"/>
    <animateTransform attributeName="transform" type="translate" dur="12s" repeatCount="indefinite"
      keyTimes="0;0.3833;0.4;0.7667;0.7833;0.787;1"
      values="0 15;0 15;0 0;0 0;0 -15;0 15;0 15"/>
    <g transform="translate(500, 50)">
      <path d="M0,20 C-7,12 -15,-2 -12,-14 C-8,-7 -3,-2 0,-7 C3,-2 8,-7 12,-14 C15,-2 7,12 0,20 Z" fill="#FF5B11"/>
      <path d="M0,20 C-3,14 -7,5 -5,-3 C-2,0 -1,3 0,0 C1,3 2,0 5,-3 C7,5 3,14 0,20 Z" fill="#FFBD2E"/>
    </g>
    <text x="535" y="54" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#FF5B11">Hono</text>
  </g>

</svg>
